<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    color: #e8e4df;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 160, 100, 0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .container {
    text-align: center;
    padding: 2rem;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rule {
    width: 48px;
    height: 1px;
    background: rgba(200, 160, 100, 0.4);
    margin: 0 auto 2rem;
    animation: fadeUp 1.2s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.4rem, 6vw, 4.5rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: #f5f0ea;
    animation: fadeUp 1.2s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  p {
    margin-top: 1.2rem;
    font-size: 1rem;
    color: rgba(232, 228, 223, 0.45);
    letter-spacing: 0.04em;
    font-weight: 400;
    animation: fadeUp 1.2s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="glow"></div>
  <div class="container">
    <div class="rule"></div>
    <h1>Coming Soon</h1>
    <p>Something new is on the way.</p>
  </div>
</body>
</html>
